id: detect-cla-requirement
stage: analyst
severity: high
confidence: 0.95
source: manual
created_at: "2026-03-23"
evidence_count: 4
tags: [cla, legal, contribution-gate]
condition: |
  Repo uses CLA bot that blocks merge without signature.
body: |
  Check if the repo has CLA requirements by looking at:
  1. Recent merged PRs for CLA bot comments (cla-assistant, CLAassistant, cla-bot)
  2. CONTRIBUTING.md for CLA mentions
  3. .github/ for CLA configuration files

  If CLA is required, note it in the analysis so the submitter can handle it.
  Known CLA repos: langgenius/dify, open-webui/open-webui.
